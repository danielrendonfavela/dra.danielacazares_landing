<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! - Dra. Daniela Cázares</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .success-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--secondary);
            padding: 2rem;
            text-align: center;
        }

        .success-container {
            background: white;
            padding: 4rem 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(200, 155, 60, 0.2);
        }

        .success-icon {
            font-size: 5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        .success-text {
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .download-btn {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(200, 155, 60, 0.3);
            margin-bottom: 1.5rem;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(200, 155, 60, 0.4);
            background-color: var(--primary-hover);
            color: white;
        }

        .back-link {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <section class="success-page">
        <div class="success-container">
            <i class="fas fa-check-circle success-icon"></i>
            <h1 class="success-title">¡Pago Exitoso!</h1>
            <p class="success-text">
                Gracias por adquirir el <strong>Manual Clínico de Estratificación Bee Natural</strong>. Tu pago ha sido
                procesado correctamente.
                <br><br>
                Haz clic en el botón de abajo para comenzar la descarga de tu archivo PDF.
            </p>

            <!-- NATIVE DOWNLOAD LINK -->
            <a href="assets/manual-clinico.pdf" download="Manual_Clinico_Bee_Natural.pdf" class="download-btn">
                <i class="fas fa-download"></i> Descargar Manual PDF
            </a>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver a la página principal
            </a>

            <div class="security-note">
                <i class="fas fa-lock"></i>
                <p>Descarga segura y directa.</p>
            </div>
        </div>
    </section>

</body>

</html>
